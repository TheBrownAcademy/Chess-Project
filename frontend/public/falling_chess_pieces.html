<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Falling Chess Pieces</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #0b1020;
        height: 100%;
        font-family: Arial, sans-serif;
    }

    canvas {
        display: block;
    }

    #floor {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 80px;
        background: rgba(255,255,255,0.05);
        border-top: 1px solid rgba(255,255,255,0.1);
    }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="floor"></div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const pieces = ["♙","♘","♗","♖","♕","♔","♟","♞","♝","♜","♛","♚"];
const objects = [];

function spawnPiece() {
    const size = 28 + Math.random() * 18;
    objects.push({
        x: Math.random() * canvas.width,
        y: -50,
        vy: 0,
        vx: (Math.random() - 0.5) * 0.5,
        rot: Math.random() * Math.PI,
        vr: (Math.random() - 0.5) * 0.02,
        size: size,
        char: pieces[Math.floor(Math.random() * pieces.length)],
        settled: false
    });
}

setInterval(spawnPiece, 900);

const gravity = 0.03;
const floorY = () => canvas.height - 80;

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let p of objects) {
        if (!p.settled) {
            p.vy += gravity;
            p.x += p.vx;
            p.y += p.vy;
            p.rot += p.vr;

            if (p.y + p.size / 2 >= floorY()) {
                p.y = floorY() - p.size / 2;
                p.vy *= -0.2;
                p.vx *= 0.6;
                p.vr *= 0.7;

                if (Math.abs(p.vy) < 0.5) {
                    p.settled = true;
                    p.vy = 0;
                }
            }
        }

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.font = `${p.size}px serif`;
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(p.char, 0, 0);
        ctx.restore();
    }

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
