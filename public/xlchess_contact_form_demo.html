<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XLChess Contact Form Demo</title>
  <style>
    :root {
      --page-bg: #0a0f24;
      --footer-bg: #0f1436;
      --card-bg: rgba(21, 27, 61, 0.72);
      --input-bg: rgba(10, 19, 38, 0.9);
      --purple: #6e63f6;
      --purple-2: #7b6dff;
      --ice: #89c2ff;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.62);
      --placeholder: rgba(255, 255, 255, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 20%, rgba(123, 109, 255, 0.22), transparent 28%),
        radial-gradient(circle at 80% 15%, rgba(137, 194, 255, 0.12), transparent 24%),
        radial-gradient(circle at 50% 80%, rgba(110, 99, 246, 0.18), transparent 32%),
        var(--page-bg);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.026) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.026) 1px, transparent 1px);
      background-size: 92px 92px;
      mask-image: radial-gradient(circle at 50% 38%, black 0%, transparent 72%);
    }

    .particle {
      position: fixed;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--ice);
      opacity: 0.35;
      box-shadow: 0 0 14px var(--ice);
      animation: floatUp linear infinite;
      pointer-events: none;
    }

    @keyframes floatUp {
      from { transform: translateY(105vh); opacity: 0; }
      15% { opacity: 0.36; }
      85% { opacity: 0.26; }
      to { transform: translateY(-10vh); opacity: 0; }
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: calc(100vh - 110px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
    }

    .contact-card {
      position: relative;
      width: min(1056px, 100%);
      padding: 84px 96px 72px;
      overflow: hidden;
      border-radius: 24px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), transparent 34%),
        radial-gradient(circle at 0% 0%, rgba(137, 194, 255, 0.16), transparent 28%),
        radial-gradient(circle at 100% 0%, rgba(123, 109, 255, 0.18), transparent 26%),
        var(--card-bg);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow:
        0 28px 80px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -1px 0 rgba(137,194,255,0.08);
      backdrop-filter: blur(22px);
    }

    .contact-card::before {
      content: "♞";
      position: absolute;
      right: 40px;
      top: 8px;
      font-size: 420px;
      line-height: 1;
      opacity: 0.035;
      color: #fff;
      transform: rotate(-8deg);
      pointer-events: none;
    }

    .contact-card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background:
        radial-gradient(circle at top left, rgba(137,194,255,0.32), transparent 26%),
        radial-gradient(circle at top right, rgba(123,109,255,0.32), transparent 25%),
        radial-gradient(circle at bottom left, rgba(137,194,255,0.16), transparent 22%),
        radial-gradient(circle at bottom right, rgba(110,99,246,0.25), transparent 24%);
      opacity: 0.7;
      mix-blend-mode: screen;
    }

    .inner {
      position: relative;
      z-index: 2;
      max-width: 864px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 58px;
      text-align: center;
      font-size: clamp(42px, 5vw, 58px);
      line-height: 1;
      letter-spacing: -0.06em;
      text-shadow: 0 0 28px rgba(137,194,255,0.18);
    }

    .field {
      margin-bottom: 34px;
    }

    label {
      display: block;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 18px;
      font-weight: 700;
    }

    label span {
      color: var(--purple-2);
      text-shadow: 0 0 12px rgba(123,109,255,0.7);
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(137,194,255,0.15);
      background: var(--input-bg);
      color: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      font: inherit;
      font-size: 22px;
      outline: none;
      box-shadow:
        inset 0 0 28px rgba(0,0,0,0.3),
        0 0 0 0 rgba(137,194,255,0);
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    textarea {
      min-height: 182px;
      resize: vertical;
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--placeholder);
    }

    input:focus,
    textarea:focus {
      border-color: rgba(137,194,255,0.72);
      box-shadow:
        0 0 0 4px rgba(137,194,255,0.11),
        0 0 28px rgba(137,194,255,0.12),
        inset 0 0 28px rgba(0,0,0,0.3);
      transform: translateY(-1px);
    }

    .button {
      position: relative;
      width: 100%;
      margin-top: 16px;
      border: 0;
      border-radius: 12px;
      padding: 24px 30px;
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
      overflow: hidden;
      background: linear-gradient(90deg, #6e63f6 0%, #7268f8 50%, #7b6dff 100%);
      box-shadow:
        0 0 34px rgba(110,99,246,0.35),
        0 12px 42px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.25);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -40%;
      width: 30%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
      transform: skewX(-18deg);
      animation: buttonShine 4.5s ease-in-out infinite;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow:
        0 0 46px rgba(110,99,246,0.55),
        0 16px 48px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.28);
    }

    @keyframes buttonShine {
      0%, 35% { left: -42%; }
      65%, 100% { left: 115%; }
    }

    .arrow {
      margin-left: 16px;
      color: #fff;
    }

    footer {
      position: relative;
      z-index: 1;
      min-height: 110px;
      display: grid;
      place-items: center;
      padding: 28px 20px;
      background:
        radial-gradient(circle at 50% -50%, rgba(137,194,255,0.12), transparent 55%),
        var(--footer-bg);
      border-top: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
    }

    footer::before {
      content: "";
      position: absolute;
      top: 0;
      left: -20%;
      width: 32%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--ice), var(--purple-2), transparent);
      box-shadow: 0 0 18px rgba(137,194,255,0.8);
      animation: energyLine 8s linear infinite;
    }

    @keyframes energyLine {
      to { left: 110%; }
    }

    .footer-text {
      color: rgba(255,255,255,0.74);
      font-size: 18px;
      letter-spacing: 0.01em;
    }

    .footer-text strong {
      color: var(--ice);
      font-weight: 800;
      text-shadow: 0 0 18px rgba(137,194,255,0.35);
    }

    @media (max-width: 760px) {
      .page {
        padding: 32px 14px;
      }

      .contact-card {
        padding: 54px 24px 42px;
      }

      h1 {
        margin-bottom: 40px;
      }

      input,
      textarea,
      .button {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <span class="particle" style="left: 8%; animation-duration: 18s; animation-delay: -3s;"></span>
  <span class="particle" style="left: 18%; animation-duration: 24s; animation-delay: -12s;"></span>
  <span class="particle" style="left: 29%; animation-duration: 20s; animation-delay: -7s;"></span>
  <span class="particle" style="left: 41%; animation-duration: 26s; animation-delay: -18s;"></span>
  <span class="particle" style="left: 54%; animation-duration: 19s; animation-delay: -10s;"></span>
  <span class="particle" style="left: 67%; animation-duration: 23s; animation-delay: -5s;"></span>
  <span class="particle" style="left: 79%; animation-duration: 21s; animation-delay: -14s;"></span>
  <span class="particle" style="left: 91%; animation-duration: 25s; animation-delay: -9s;"></span>

  <main class="page">
    <section class="contact-card">
      <div class="inner">
        <h1>Contact Us</h1>

        <form>
          <div class="field">
            <label for="email">Email <span>*</span></label>
            <input id="email" type="email" placeholder="you@example.com" />
          </div>

          <div class="field">
            <label for="message">Message <span>*</span></label>
            <textarea id="message" placeholder="Tell us how we can help you."></textarea>
          </div>

          <button class="button" type="button">
            Send Message <span class="arrow">→</span>
          </button>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-text">© 2026 <strong>XLChess</strong>. Demo concept</div>
  </footer>
</body>
</html>
